name: site quality

on:
  pull_request:
    paths:
      - "src/**"
      - "public/**"
      - "scripts/**"
      - "astro.config.ts"
      - "eslint.config.js"
      - "tsconfig.json"
      - "docs/design-tokens.json"
      - "pnpm-lock.yaml"
      - "package.json"
      - "vercel.json"
      - ".github/workflows/site-quality.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.8.0
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit production dependencies
        run: pnpm audit --prod --audit-level moderate

      - name: Lint
        run: pnpm lint

      - name: Type-check
        run: pnpm check

      - name: Build
        run: pnpm build

      - name: Verify launch artifact
        run: pnpm artifact:check

      - name: Lighthouse mobile budgets
        run: pnpm lighthouse:ci

      - name: Lighthouse desktop budgets
        run: pnpm lighthouse:desktop
