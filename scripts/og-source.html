<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <style>
      @font-face {
        font-family: "Instrument Sans";
        src: url("../public/fonts/InstrumentSans.woff2") format("woff2");
        font-style: normal;
        font-weight: 400 700;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 1200px;
        height: 630px;
        margin: 0;
        overflow: hidden;
        background: #0c0d0f;
        color: #f1f0ec;
        font-family: "Instrument Sans", Arial, sans-serif;
      }

      body {
        position: relative;
        display: flex;
        padding: 54px 62px 50px;
      }

      body::before {
        position: absolute;
        inset: 0;
        opacity: 0.035;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 160 160' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='2' stitchTiles='stitchTiles'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
        content: "";
      }

      .frame {
        position: relative;
        display: flex;
        width: 100%;
        flex-direction: column;
        justify-content: space-between;
        border-top: 1px solid #3c3e43;
        padding-top: 28px;
      }

      .brand {
        color: #ff7448;
        font-size: 96px;
        font-weight: 700;
        letter-spacing: -8px;
        line-height: 0.72;
      }

      .statement {
        max-width: 820px;
        margin: 0;
        font-size: 78px;
        font-stretch: 90%;
        font-weight: 650;
        letter-spacing: -5px;
        line-height: 0.88;
      }

      .meta {
        position: absolute;
        right: 0;
        bottom: 2px;
        width: 185px;
        border-top: 2px solid #ff5e32;
        padding-top: 15px;
        color: #a9a8a3;
        font-size: 15px;
        font-weight: 600;
        letter-spacing: 2px;
        line-height: 1.55;
        text-transform: uppercase;
      }

      .cut {
        position: absolute;
        top: 0;
        right: 224px;
        width: 2px;
        height: 96px;
        background: #ff5e32;
      }
    </style>
  </head>
  <body>
    <div class="frame">
      <div class="brand">b.</div>
      <p class="statement">Software, systems<br />and small worlds.</p>
      <div class="cut"></div>
      <div class="meta">AI-native engineer<br />Game maker<br />Musician</div>
    </div>
  </body>
</html>
